<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>塘口镇 AR 管理后台</title>
  <link rel="stylesheet" href="css/admin.css?v=2">
</head>
<body>
  <!-- Login Page -->
  <div id="page-login" class="page active">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">🌾</div>
        <h1>塘口镇 AR 管理后台</h1>
        <p class="login-subtitle">阳西塘口镇 · 三下乡实践项目</p>
        <form id="loginForm">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="loginUsername" placeholder="请输入用户名" required>
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码" required>
          </div>
          <div class="form-error" id="loginError"></div>
          <button type="submit" class="btn btn-primary btn-full">登 录</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="page-app" class="page">
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <span class="brand-icon">🌾</span>
          <span class="brand-text">塘口 AR 管理</span>
        </div>
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active" data-page="dashboard">
            <span class="nav-icon">📊</span> <span class="nav-label">数据概览</span>
          </a>
          <a href="#" class="nav-item" data-page="contents">
            <span class="nav-icon">📦</span> <span class="nav-label">AR 内容管理</span>
          </a>
          <a href="#" class="nav-item" data-page="categories">
            <span class="nav-icon">🏷️</span> <span class="nav-label">分类管理</span>
          </a>
          <a href="#" class="nav-item" data-page="qrcodes">
            <span class="nav-icon">📷</span> <span class="nav-label">二维码管理</span>
          </a>
        </nav>
        <div class="sidebar-footer">
          <a href="/" target="_blank" class="nav-item">
            <span class="nav-icon">🏠</span> <span class="nav-label">回到首页</span>
          </a>
          <a href="#" class="nav-item" id="changePwdBtn">
            <span class="nav-icon">🔑</span> <span class="nav-label">修改密码</span>
          </a>
          <a href="#" class="nav-item" id="logoutBtn">
            <span class="nav-icon">🚪</span> <span class="nav-label">退出登录</span>
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Dashboard -->
        <div id="panel-dashboard" class="panel active">
          <h2>📊 数据概览</h2>
          <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
              <div class="stat-icon">📦</div>
              <div class="stat-value" id="statTotal">-</div>
              <div class="stat-label">AR 内容总数</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">✅</div>
              <div class="stat-value" id="statPublished">-</div>
              <div class="stat-label">已发布内容</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">👁️</div>
              <div class="stat-value" id="statViews">-</div>
              <div class="stat-label">总浏览量</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">🏷️</div>
              <div class="stat-value" id="statCats">-</div>
              <div class="stat-label">分类数量</div>
            </div>
          </div>
        </div>

        <!-- Contents -->
        <div id="panel-contents" class="panel">
          <div class="panel-header">
            <h2>📦 AR 内容管理</h2>
            <button class="btn btn-primary" id="btnAddContent">+ 新增内容</button>
          </div>
          <table class="data-table" id="contentsTable">
            <thead>
              <tr>
                <th>ID</th><th>标题</th><th>分类</th><th>模型/标记</th><th>状态</th><th>浏览</th><th>操作</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <!-- Categories -->
        <div id="panel-categories" class="panel">
          <div class="panel-header">
            <h2>🏷️ 分类管理</h2>
            <button class="btn btn-primary" id="btnAddCategory">+ 新增分类</button>
          </div>
          <table class="data-table" id="categoriesTable">
            <thead>
              <tr><th>ID</th><th>图标</th><th>名称</th><th>标识</th><th>描述</th><th>排序</th><th>操作</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <!-- QR Codes -->
        <div id="panel-qrcodes" class="panel">
          <div class="panel-header">
            <h2>📷 二维码管理</h2>
            <button class="btn btn-outline" id="btnGenerateAllQR">🔧 批量生成二维码</button>
          </div>
          <div class="qr-grid" id="qrGrid">
            <!-- JS populated -->
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal Container -->
  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal" id="modalContent">
      <!-- Dynamic content -->
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js?v=3"></script>
  <script src="js/utils.js?v=3"></script>
  <script src="js/pages/login.js?v=3"></script>
  <script src="js/pages/dashboard.js?v=3"></script>
  <script src="js/pages/contents.js?v=3"></script>
  <script src="js/pages/categories.js?v=3"></script>
  <script src="js/pages/qrcodes.js?v=3"></script>
  <script src="js/admin.js?v=3"></script>
</body>
</html>
